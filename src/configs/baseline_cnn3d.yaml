run_name: cnn3d
output_dir: results
seed: 0
deterministic: true
device: cuda

data:
  synthetic: true
  synthetic_n_train: 128
  synthetic_n_val: 64
  in_channels: 1
  spatial_size: [96, 96, 96]
  spacing: [1.5, 1.5, 1.5]
  hu_window: [-1000.0, 400.0]
  manifest: data/manifests/labels.csv
  data_root: data/raw
  train_ids: data/manifests/splits/train.txt
  val_ids:   data/manifests/splits/val.txt
  test_ids:  data/manifests/splits/test.txt

model:
  kind: cnn3d
  n_classes: 2
  widths: [16, 32, 64, 128]
  dropout: 0.2
  feature_dim: 128
  backbone: random_init
  checkpoint_path: null
  head_hidden: 256
  head_dropout: 0.2
  lora:
    r: 8
    alpha: 16
    dropout: 0.05
    target_substrings: [attn, mlp, qkv, proj]

train:
  epochs: 30
  batch_size: 4
  num_workers: 2
  lr: 3.0e-4
  weight_decay: 1.0e-4
  grad_clip: 1.0
