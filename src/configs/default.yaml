# Base config — every per-experiment YAML inherits these defaults
# (we merge with OmegaConf, so override anything by re-declaring it).

run_name: default
output_dir: results
seed: 0
deterministic: true
device: cuda            # falls back to cpu automatically if no CUDA

data:
  # Set synthetic=true to run end-to-end on random tensors (smoke tests / CI).
  # Set synthetic=false once you've run data/download_flare.py.
  synthetic: true
  synthetic_n_train: 64
  synthetic_n_val: 32

  in_channels: 1
  spatial_size: [96, 96, 96]
  spacing: [1.5, 1.5, 1.5]
  hu_window: [-1000.0, 400.0]

  manifest: data/manifests/labels.csv
  data_root: data/raw
  train_ids: data/manifests/splits/train.txt
  val_ids:   data/manifests/splits/val.txt
  test_ids:  data/manifests/splits/test.txt

model:
  kind: cnn3d            # one of: prior, cnn3d, linear_probe, lora
  n_classes: 2
  widths: [16, 32, 64, 128]
  dropout: 0.2
  feature_dim: 128
  backbone: random_init   # used by linear_probe / lora (set to 3dino|spectre once wired)
  checkpoint_path: null
  head_hidden: 256
  head_dropout: 0.2
  lora:
    r: 8
    alpha: 16
    dropout: 0.05
    target_substrings: [attn, mlp, qkv, proj]

train:
  epochs: 30
  batch_size: 4
  num_workers: 2
  lr: 1.0e-4
  weight_decay: 1.0e-4
  grad_clip: 1.0
